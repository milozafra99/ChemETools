<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChemEng Tools – Unit Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      margin: 0;
    }
    header {
      border-bottom: 1px solid #111827;
      background: #020617;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.25rem 2rem;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }
    .brand-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0;
    }
    a.nav-link {
      font-size: 0.86rem;
      color: #93c5fd;
      text-decoration: none;
    }
    a.nav-link:hover { color: #bfdbfe; }

    main .container {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 780px;
      background: #020617;
      border-radius: 12px;
      padding: 1.5rem 1.8rem 2rem;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      border: 1px solid #111827;
    }

    p {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      color: #9ca3af;
    }
    label {
      font-size: 0.9rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.25rem;
      color: #e5e7eb;
    }
    select, input {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #1f2937;
      background: #ffffff;
      color: #111827;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }
    select:focus, input:focus {
      outline: 2px solid #2563eb;
      outline-offset: 1px;
      border-color: transparent;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    button {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #1d4ed8; }
    .result {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      background: #020617;
      border: 1px solid #1f2937;
      font-size: 1rem;
    }
    .error {
      color: #fca5a5;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .muted {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container brand">
      <div class="brand-left">
        <div class="logo"></div>
        <div>
          <h1>Unit Converter</h1>
          <span style="font-size:0.8rem;color:#9ca3af;">Part of ChemEng Tools</span>
        </div>
      </div>
      <a class="nav-link" href="index.html">← Back to all tools</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="app">

        <label for="category">Category</label>
        <select id="category"></select>

        <div class="row">
          <div>
            <label for="fromUnit">From unit</label>
            <select id="fromUnit"></select>
          </div>
          <div>
            <label for="toUnit">To unit</label>
            <select id="toUnit"></select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="value">Value</label>
            <input id="value" type="number" step="any" placeholder="Enter value" />
          </div>
          <div>
            <label for="decimals">Decimal places</label>
            <input id="decimals" type="number" min="0" max="10" value="4" />
          </div>
        </div>

        <button id="convertBtn">Convert</button>

        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
        <div class="muted">
          All calculators on this site share the same unit database. Edit
          <code>chemeng-units.js</code> once to add or update units.
        </div>
      </div>
    </div>
  </main>

  <!-- Shared units & converters -->
  <script src="chemeng-units.js"></script>

  <!-- Page-specific UI logic -->
  <script>
    const categorySelect = document.getElementById("category");
    const fromSelect = document.getElementById("fromUnit");
    const toSelect = document.getElementById("toUnit");
    const valueInput = document.getElementById("value");
    const decimalsInput = document.getElementById("decimals");
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");
    const convertBtn = document.getElementById("convertBtn");

    // Populate categories from shared list
    for (const cat of getUnitCategories()) {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat;
      categorySelect.appendChild(opt);
    }

    function populateUnits() {
      const category = categorySelect.value;
      fromSelect.innerHTML = "";
      toSelect.innerHTML = "";
      errorDiv.textContent = "";

      const units = getUnitsForCategory(category);
      units.forEach((u, idx) => {
        const o1 = document.createElement("option");
        const o2 = document.createElement("option");
        o1.value = u.key; o1.textContent = u.label;
        o2.value = u.key; o2.textContent = u.label;
        fromSelect.appendChild(o1);
        toSelect.appendChild(o2);
        if (idx === 1) toSelect.selectedIndex = 1;
      });
    }

    categorySelect.addEventListener("change", populateUnits);

    function convert() {
      errorDiv.textContent = "";
      const category = categorySelect.value;
      const fromKey = fromSelect.value;
      const toKey = toSelect.value;
      const valStr = valueInput.value;

      if (!valStr) {
        errorDiv.textContent = "Please enter a value.";
        return;
      }

      const value = Number(valStr);
      if (!Number.isFinite(value)) {
        errorDiv.textContent = "Invalid numeric value.";
        return;
      }

      let decimals = Number(decimalsInput.value);
      if (!Number.isInteger(decimals) || decimals < 0 || decimals > 10) {
        decimals = 4;
      }

      let result;
      try {
        result = convertUnits(category, value, fromKey, toKey);
      } catch (e) {
        console.error(e);
        errorDiv.textContent = "Conversion error: " + e.message;
        return;
      }

      resultDiv.textContent =
        value + " " + fromKey + " = " + result.toFixed(decimals) + " " + toKey;
    }

    convertBtn.addEventListener("click", convert);
    valueInput.addEventListener("keydown", e => {
      if (e.key === "Enter") convert();
    });

    // Initial state
    categorySelect.value = "Length";
    populateUnits();
  </script>
</body>
</html>
