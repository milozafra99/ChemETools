<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Test Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="website-style.css">
</head>
<body>
  <div id="tool-nav-container"></div>
  <script>
    // Load shared navbar from tool-nav.html
    (function () {
      var container = document.getElementById("tool-nav-container");
      if (!container) return;
      fetch("tool-nav.html")
        .then(function (res) { return res.text(); })
        .then(function (html) {
          container.innerHTML = html;
        })
        .catch(function (err) {
          console.error("Failed to load navigation:", err);
        });
    })();
  </script>
  <main>
    <div class="container">
      <div class="scroll-x">
        <table>
          <tr>
            <td>
              <div>
                <label for="number1">Number 1</label>
                <input id="number1" type="number" step="any" placeholder="Enter value" />
              </div>
            </td>
            <td>
              <div>
                <label for="number2">Number 2</label>
                <input id="number2" type="number" step="any" placeholder="Enter value" />
              </div>
            </td>
          </tr>  
          <tr>
            <td>
              <label for="result">Result:</label>
              <div id="result" class="result">input values to add</div>
              <div id="error" class="error"></div>
            </td>
          </tr>
          </table>
        </div>
        <button id="convertBtn">Convert</button>
      </div>
    </div>
  </main>

  <!-- Shared units & converters -->
  <script src="chemeng-units.js"></script>

  <!-- Page-specific UI logic -->
  <script>
    const NumOne = document.getElementById("number1");
    const NumTwo = document.getElementById("number2");
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");
    const convertBtn = document.getElementById("convertBtn");

    function convert() {
      errorDiv.textContent = "";
      const EnOne = NumOne.value;
      const EnTwo = NumTwo.value;
      
      let result;
      try {
        result = EnOne + EnTwo;
      } catch (e) {
        console.error(e);
        errorDiv.textContent = "Conversion error: " + e.message;
        return;
      }
      // resultDiv.textContent = result.toFixed(decimals);      
    }
    
    convertBtn.addEventListener("click", convert);
    
    // Initial state
  </script>
</body>
</html>
